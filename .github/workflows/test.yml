name: Bermuda Test

on: push

jobs:
  compile-requirements:
    name: Compile requirements
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dependency group .txt files
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip compile requirements/dev.in -o requirements/dev.txt
          uv pip compile requirements/docs.in -o requirements/docs.txt
          uv pip compile requirements/chainladder.in -o requirements/chainladder.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: 'requirements/dev.txt requirements/docs.txt requirements/chainladder.txt'
          commit_message: Automatically built dev and docs requirements .txt files

  test:
    name: Bermuda Test (py${{ matrix.python-version }}, numpy ${{ matrix.numpy-version }})
    runs-on: ubuntu-latest
    needs: compile-requirements
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        numpy-version: ['1.26.4', '2.*']

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install '.[dev]'
          python3 -m pip install --upgrade "numpy==${{ matrix.numpy-version }}"
          python3 -m pip install .

      - name: Test
        run: pytest test
